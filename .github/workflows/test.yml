name: C test powerobject
run-name: C test powerobject triggered bt ${{ github.actor }}
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
on:
  label:
    types:
      - created
      - edited
      - deleted
  push:
    branches:
      - main
      - "**"
  schedule:
    - cron: "17 2 * * *"
jobs:
  greeting-bash:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Compile
        run: gcc -Wall -Wextra tests/ctests/powerobject.c -o ct_powerobject -Isrc/PowerViolenceObjects
      - name: Run
        run: gcc -Wall -Wextra tests/ctests/powerobject.c -o ct_powerobject -Isrc/PowerViolenceObjects

